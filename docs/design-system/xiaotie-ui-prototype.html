<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小铁 UI 原型</title>
    <style>
      :root {
        --primary: #818cf8;
        --secondary: #a78bfa;
        --success: #34d399;
        --warning: #fbbf24;
        --error: #f87171;
        --bg: #0f172a;
        --surface: #1e293b;
        --surface-2: #334155;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --border: #475569;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }
      .app {
        height: 100vh;
        display: grid;
        grid-template-rows: 48px 1fr 72px 32px;
      }
      .header,
      .status {
        display: flex;
        align-items: center;
        padding: 0 16px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
      }
      .content {
        display: grid;
        grid-template-columns: 1fr 280px;
        min-height: 0;
      }
      .messages {
        padding: 16px;
        overflow: auto;
        border-right: 1px solid var(--border);
      }
      .msg {
        background: var(--surface);
        border: 1px solid var(--border);
        border-left: 4px solid var(--primary);
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 12px;
      }
      .msg.assistant {
        border-left-color: var(--success);
      }
      .sidebar {
        padding: 12px;
        background: #111d34;
      }
      .session {
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-bottom: 8px;
      }
      .editor {
        border-top: 1px solid var(--border);
        background: var(--surface);
        padding: 10px 16px;
        display: grid;
        gap: 8px;
      }
      .hint {
        color: var(--muted);
        font-size: 13px;
      }
      input {
        width: 100%;
        height: 36px;
        border: 1px solid var(--border);
        background: #0b162a;
        color: var(--text);
        border-radius: 8px;
        padding: 0 10px;
      }
      .status {
        border-top: 1px solid var(--border);
        border-bottom: none;
        color: var(--muted);
        font-size: 13px;
      }
      @media (max-width: 1100px) {
        .content {
          grid-template-columns: 1fr;
        }
        .sidebar {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="header">小铁 XiaoTie · 现代终端 Agent UI 原型</div>
      <div class="content">
        <main class="messages">
          <div class="msg">用户：请给我一个重构计划。</div>
          <div class="msg assistant">助手：已完成架构盘点与分阶段路线图。</div>
        </main>
        <aside class="sidebar">
          <div class="session">当前会话 · 42 条消息</div>
          <div class="session">重构方案讨论</div>
          <div class="session">测试与验收</div>
        </aside>
      </div>
      <div class="editor">
        <div class="hint">
          Enter 发送 · / 命令 · Ctrl+K 快捷命令 · Ctrl+M 模型 · Ctrl+T 主题
        </div>
        <input placeholder="输入你的问题..." />
      </div>
      <div class="status">
        模型: claude-sonnet-4 | Token: 12,840 | 状态: 就绪 | 模式: 并行 思考 |
        主题: Claude Night
      </div>
    </div>
  </body>
</html>
