<svg xmlns="http://www.w3.org/2000/svg" width="820" height="560">
  <defs>
    <style>
      .bg { fill: #1e1e2e; }
      .titlebar { fill: #313244; }
      .red { fill: #f38ba8; }
      .yellow { fill: #f9e2af; }
      .green { fill: #a6e3a1; }
      .text { fill: #cdd6f4; font-family: 'Menlo', 'Monaco', monospace; font-size: 13px; }
      .dim { fill: #6c7086; font-family: 'Menlo', 'Monaco', monospace; font-size: 13px; }
      .cyan { fill: #89dceb; font-family: 'Menlo', 'Monaco', monospace; font-size: 13px; }
      .green-text { fill: #a6e3a1; font-family: 'Menlo', 'Monaco', monospace; font-size: 13px; }
      .yellow-text { fill: #f9e2af; font-family: 'Menlo', 'Monaco', monospace; font-size: 13px; }
      .blue-text { fill: #89b4fa; font-family: 'Menlo', 'Monaco', monospace; font-size: 13px; }
      .red-text { fill: #f38ba8; font-family: 'Menlo', 'Monaco', monospace; font-size: 13px; }
      .bold { font-weight: bold; }
      .box { fill: none; stroke: #45475a; stroke-width: 1; rx: 4; }
      .box-active { fill: none; stroke: #89b4fa; stroke-width: 2; rx: 4; }
    </style>
  </defs>
  <rect class="bg" width="820" height="560" rx="10"/>
  <rect class="titlebar" width="820" height="36" rx="10 10 0 0"/>
  <circle class="red" cx="20" cy="18" r="6"/>
  <circle class="yellow" cx="40" cy="18" r="6"/>
  <circle class="green" cx="60" cy="18" r="6"/>
  <text class="dim" x="370" y="22" text-anchor="middle">AgentRuntime State Machine — Architecture</text>

  <!-- State boxes -->
  <rect class="box" x="30" y="60" width="120" height="45"/>
  <text class="dim" x="90" y="87" text-anchor="middle">IDLE</text>

  <rect class="box-active" x="200" y="60" width="130" height="45"/>
  <text class="blue-text bold" x="265" y="87" text-anchor="middle">THINKING</text>

  <rect class="box" x="380" y="60" width="120" height="45"/>
  <text class="yellow-text" x="440" y="87" text-anchor="middle">ACTING</text>

  <rect class="box" x="550" y="60" width="140" height="45"/>
  <text class="cyan" x="620" y="87" text-anchor="middle">OBSERVING</text>

  <rect class="box" x="350" y="130" width="150" height="45"/>
  <text class="green-text" x="425" y="157" text-anchor="middle">REFLECTING</text>

  <!-- Arrows -->
  <text class="dim" x="160" y="80">→</text>
  <text class="dim" x="340" y="80">→</text>
  <text class="dim" x="510" y="80">→</text>
  <text class="dim" x="620" y="115">↓</text>
  <text class="dim" x="290" y="150">←</text>

  <!-- Component boxes -->
  <rect class="box" x="30" y="210" width="240" height="140" rx="6"/>
  <text class="blue-text bold" x="40" y="235">ToolExecutor</text>
  <text class="text" x="40" y="258">• 顺序/并行执行</text>
  <text class="text" x="40" y="278">• 权限检查 (low/med/high)</text>
  <text class="text" x="40" y="298">• 敏感输出脱敏</text>
  <text class="text" x="40" y="318">• 审计日志 + 遥测</text>

  <rect class="box" x="290" y="210" width="240" height="140" rx="6"/>
  <text class="cyan bold" x="300" y="235">ResponseHandler</text>
  <text class="text" x="300" y="258">• 流式/非流式统一</text>
  <text class="text" x="300" y="278">• Token 增量统计</text>
  <text class="text" x="300" y="298">• 预算管理 + 裁剪</text>
  <text class="text" x="300" y="318">• 自动摘要</text>

  <rect class="box" x="550" y="210" width="240" height="140" rx="6"/>
  <text class="green-text bold" x="560" y="235">ContextEngine</text>
  <text class="text" x="560" y="258">• Token 预算分配</text>
  <text class="text" x="560" y="278">• 优先级: SYS > REPO > MEM</text>
  <text class="text" x="560" y="298">• 超预算自动裁剪</text>
  <text class="text" x="560" y="318">• 8 种上下文块类型</text>

  <!-- Bottom layer -->
  <rect class="box" x="30" y="380" width="180" height="120" rx="6"/>
  <text class="yellow-text bold" x="40" y="405">SandboxManager</text>
  <text class="dim" x="40" y="428">macOS: Seatbelt</text>
  <text class="dim" x="40" y="448">Linux: Bubblewrap</text>
  <text class="dim" x="40" y="468">通用: rlimits</text>

  <rect class="box" x="230" y="380" width="180" height="120" rx="6"/>
  <text class="red-text bold" x="240" y="405">SecretManager</text>
  <text class="dim" x="240" y="428">1. Keyring (Keychain)</text>
  <text class="dim" x="240" y="448">2. 环境变量</text>
  <text class="dim" x="240" y="468">3. Config fallback</text>

  <rect class="box" x="430" y="380" width="180" height="120" rx="6"/>
  <text class="blue-text bold" x="440" y="405">RepoMapEngine</text>
  <text class="dim" x="440" y="428">tree-sitter AST</text>
  <text class="dim" x="440" y="448">NetworkX PageRank</text>
  <text class="dim" x="440" y="468">8 种语言支持</text>

  <rect class="box" x="630" y="380" width="160" height="120" rx="6"/>
  <text class="cyan bold" x="640" y="405">LLM Gateway</text>
  <text class="dim" x="640" y="428">Anthropic</text>
  <text class="dim" x="640" y="448">OpenAI / GLM</text>
  <text class="dim" x="640" y="468">Gemini / DeepSeek</text>

  <!-- Layer labels -->
  <text class="dim" x="10" y="200">L4 编排</text>
  <text class="dim" x="10" y="370">L1 基础</text>
</svg>
