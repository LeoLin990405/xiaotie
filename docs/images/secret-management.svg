<svg xmlns="http://www.w3.org/2000/svg" width="820" height="440">
  <defs>
    <style>
      .bg { fill: #1e1e2e; }
      .titlebar { fill: #313244; }
      .red { fill: #f38ba8; }
      .yellow { fill: #f9e2af; }
      .green { fill: #a6e3a1; }
      .text { fill: #cdd6f4; font-family: 'Menlo', 'Monaco', monospace; font-size: 13px; }
      .dim { fill: #6c7086; font-family: 'Menlo', 'Monaco', monospace; font-size: 13px; }
      .cyan { fill: #89dceb; font-family: 'Menlo', 'Monaco', monospace; font-size: 13px; }
      .green-text { fill: #a6e3a1; font-family: 'Menlo', 'Monaco', monospace; font-size: 13px; }
      .yellow-text { fill: #f9e2af; font-family: 'Menlo', 'Monaco', monospace; font-size: 13px; }
      .blue-text { fill: #89b4fa; font-family: 'Menlo', 'Monaco', monospace; font-size: 13px; }
      .red-text { fill: #f38ba8; font-family: 'Menlo', 'Monaco', monospace; font-size: 13px; }
      .bold { font-weight: bold; }
    </style>
  </defs>
  <rect class="bg" width="820" height="440" rx="10"/>
  <rect class="titlebar" width="820" height="36" rx="10 10 0 0"/>
  <circle class="red" cx="20" cy="18" r="6"/>
  <circle class="yellow" cx="40" cy="18" r="6"/>
  <circle class="green" cx="60" cy="18" r="6"/>
  <text class="dim" x="370" y="22" text-anchor="middle">xiaotie secret — 密钥管理</text>

  <text class="cyan bold" x="20" y="65">$ xiaotie secret list</text>

  <text class="dim" x="20" y="92">KEY                       SOURCE          VALUE</text>
  <text class="dim" x="20" y="109">───────────────────────────────────────────────────────</text>
  <text class="green-text" x="20" y="126">api_key                   keyring         9816****VAbH</text>
  <text class="green-text" x="20" y="143">github_token              env:GITHUB_TOKEN ghp_****d5Ts</text>
  <text class="yellow-text" x="20" y="160">openai_api_key            keyring         sk-0****7262</text>

  <text class="cyan bold" x="20" y="195">$ xiaotie secret migrate</text>
  <text class="text" x="20" y="215">扫描配置文件: config/config.yaml</text>
  <text class="text" x="20" y="235">✓ 已迁移 2 个密钥到 keyring:</text>
  <text class="green-text" x="20" y="255">  - api_key</text>
  <text class="green-text" x="20" y="275">  - proxy_password</text>
  <text class="text" x="20" y="295">配置文件已更新，明文密钥已替换为 ${secret:...} 占位符</text>

  <text class="cyan bold" x="20" y="330">$ xiaotie secret set telegram_token</text>
  <text class="text" x="20" y="350">请输入 [telegram_token] 的值: ••••••••••••••</text>
  <text class="green-text" x="20" y="370">✓ 密钥 [telegram_token] 已安全存储</text>

  <text class="dim" x="20" y="410">提示: 密钥存储在 macOS Keychain，在 config.yaml 中使用 ${secret:key} 引用</text>
</svg>
