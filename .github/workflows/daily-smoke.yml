name: Daily Smoke

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  daily-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run daily smoke tests
        run: |
          pytest tests/integration/test_core_business_smoke.py -v --tb=short -m smoke
