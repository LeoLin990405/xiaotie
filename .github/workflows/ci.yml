name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run core smoke tests
        run: |
          pytest tests/integration/test_core_business_smoke.py -v --tb=short -m smoke

  test:
    runs-on: ubuntu-latest
    needs: [smoke]
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run linter
        run: |
          ruff check xiaotie/

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff 'black<26.0.0'

      - name: Check formatting
        run: |
          black --check xiaotie/

      - name: Check linting
        run: |
          ruff check xiaotie/

  performance-gate:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run benchmark
        run: |
          python3 benchmarks/agent_perf_benchmark.py

      - name: Check benchmark thresholds
        run: |
          python3 scripts/check_benchmark_thresholds.py \
            --report-json benchmarks/results/performance-gate-report.json \
            --report-md benchmarks/results/performance-gate-report.md

      - name: Append performance summary
        if: always()
        run: |
          cat benchmarks/results/performance-gate-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload performance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-gate-report
          path: |
            benchmarks/results/latest.json
            benchmarks/results/performance-gate-report.json
            benchmarks/results/performance-gate-report.md

      - name: Notify Slack on performance gate failure
        if: failure() && secrets.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"[xiaotie] CI performance gate failed on ${GITHUB_REF_NAME}. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
            "$SLACK_WEBHOOK_URL"

      - name: Notify Feishu on performance gate failure
        if: failure() && secrets.FEISHU_WEBHOOK_URL != ''
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"[xiaotie] CI performance gate failed on ${GITHUB_REF_NAME}. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}}" \
            "$FEISHU_WEBHOOK_URL"

  deploy-config-gate:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Check docker compose config
        run: |
          docker compose -f deployment/docker-compose.prod.yml config >/dev/null
